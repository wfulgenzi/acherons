<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connection — Acherons (local)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, sans-serif;
        max-width: 420px;
        margin: 0 auto;
        padding: 20px 16px 32px;
        font-size: 14px;
        line-height: 1.45;
        color: #1a1a1a;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 4px;
      }
      p.sub {
        color: #555;
        font-size: 0.9rem;
        margin: 0 0 16px;
      }
      #badge {
        display: inline-block;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .badge-ok {
        background: #dcfce7;
        color: #14532d;
      }
      .badge-mid {
        background: #fef3c7;
        color: #78350f;
      }
      .badge-bad {
        background: #fee2e2;
        color: #7f1d1d;
      }
      .badge-na {
        background: #f1f5f9;
        color: #334155;
      }
      #detail {
        font-size: 0.8rem;
        color: #444;
        margin: 0 0 16px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      #actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
      }
      button,
      a.back {
        display: inline-block;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        color: #1a1a1a;
        background: #f0f0f0;
        border: 1px solid #d4d4d4;
      }
      a.back:hover,
      button:hover {
        background: #e5e5e5;
      }
      a.back {
        border-color: #ccc;
      }
    </style>
  </head>
  <body>
    <h1>Extension connection</h1>
    <p class="sub">
      <code id="app-base"></code> — Bearer session check
    </p>
    <div id="badge" class="badge-na">…</div>
    <p id="detail" aria-live="polite">Checking…</p>
    <div id="actions">
      <button type="button" id="refresh">Refresh</button>
      <button type="button" id="sign-out" title="Clear tokens stored in this extension">
        Sign out (this extension)
      </button>
    </div>
    <p style="margin-top: 20px; font-size: 0.8rem; color: #666">
      Use the extension <strong>popup</strong> (puzzle → Acherons) to
      <strong>Connect</strong> and store tokens. This tab does not need to open
      during the handoff window.
    </p>
    <script src="lib.js" defer></script>
    <script src="status.js" defer></script>
  </body>
</html>
